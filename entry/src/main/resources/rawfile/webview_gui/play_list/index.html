<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArkMusic</title>
    <link rel="stylesheet" href="../public_css/color.css">
    <link rel="stylesheet" href="css/queue_show.css">
    <link rel="stylesheet" href="css/slide.css">
    <style>
        body {

            margin: 0;
            padding: 0;

            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;

        }
        body * {
            /* border: 1px solid palevioletred; */
        }
    </style>
</head>
<body>
    
    <!-- 最上层队列显示 -->
    <div class="queue_show box_color" id="queue_show">
        <p class="font_color">100 / 100</p>
    </div>

    <!-- 滑动框架 -->
    <div class="slide_frame">
        <!-- 占位符 -->
        <div style="height: 50px; position: relative; top: 0;"></div>
        <div class="slide" id="slide">

            <!-- 滑块内容(会实时变动) -->
            <!-- 以下是案例 -->
            <div onclick="console.log(0)" class="box_color" id="0"><div></div><p class="font_color">未知歌曲1</p></div>
            <div onclick="console.log(1)" class="box_color" id="1"><div></div><p class="font_color">未知歌曲2</p></div>
            <div onclick="console.log(2)" class="box_color" id="2"><div></div><p class="font_color">未知歌曲3</p></div>
            <div onclick="console.log(3)" class="box_color" id="3"><div></div><p class="font_color">未知歌曲4</p></div>
            <div onclick="console.log(4)" class="box_color" id="4"><div></div><p class="font_color">未知歌曲5</p></div>
            <div onclick="console.log(5)" class="box_color" id="5"><div></div><p class="font_color">未知歌曲6</p></div>
            <div onclick="console.log(6)" class="box_color" id="6"><div></div><p class="font_color">未知歌曲7</p></div>
            <div onclick="console.log(7)" class="box_color" id="7"><div></div><p class="font_color">未知歌曲8</p></div>
            <div onclick="console.log(8)" class="box_color" id="8"><div></div><p class="font_color">未知歌曲9</p></div>
            <div onclick="console.log(9)" class="box_color" id="9"><div></div><p class="font_color">未知歌曲10</p></div>
            <div onclick="console.log(10)" class="box_color" id="10"><div></div><p class="font_color">未知歌曲11</p></div>

        </div>
        <!-- 占位符 -->
        <div style="height: 125px; position: relative; top: 0;"></div>
    </div>
    
    <!-- 函数块 -->
    <script src="../public_js/color_update.js"></script>
    <script src="js/environment.js"></script>
    <script src="js/function.js"></script>
    <script src="js/event_listener.js"></script>
    <script src="js/ark_update.js"></script>
    <script src="js/start.js"></script>

</body>
</html>
