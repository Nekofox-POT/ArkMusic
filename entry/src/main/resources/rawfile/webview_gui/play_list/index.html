<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArkMusic</title>
    <link rel="stylesheet" href="../public_css/color.css">
    <link rel="stylesheet" href="css/queue_show.css">
    <link rel="stylesheet" href="css/slide.css">
    <style>
        body {

            margin: 0;
            padding: 0;

            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;

        }
        body * {
            /* border: 1px solid palevioletred; */
        }
    </style>
</head>
<body>
    
    <!-- 最上层队列显示 -->
    <div class="queue_show box_color" id="queue_show">
        <p class="font_color" id="play_index_screen">0 / 0</p>
    </div>

    <!-- 滑动框架 -->
    <div class="slide_frame">
        <!-- 占位符 -->
        <div style="height: 50px; position: relative; top: 0;"></div>
        <div class="slide" id="slide">

            <!-- 滑块内容(会实时变动) -->
            
        </div>
        <!-- 占位符 -->
        <div style="height: 125px; position: relative; top: 0;"></div>
    </div>
    
    <!-- 函数块 -->
    <script src="../public_js/color_update.js"></script>
    <script src="js/environment.js"></script>
    <script src="js/function.js"></script>
    <script src="js/event_listener.js"></script>
    <script src="js/ark_update.js"></script>
    <script src="js/start.js"></script>

</body>
</html>
