<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>FLIP</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			.container {
				width: 100vw;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.box {
				padding: 10px;
				height: fit-content;
				width: 600px;
				background-color: transparent;
				border: 2px solid black;
				gap: 8px;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
			}

			.draggable {
				width: 100%;
				height: 48px;
				background-color: #22c55e;
				border-radius: 8px;
				color: white;
				line-height: 48px;
				padding-left: 16px;
				font-size: 1.25rem;
				cursor: pointer;
			}

			.dragging {
				background: transparent;
				color: transparent;
				border: 1px dashed #ccc;
			}
		</style>
	</head>

	<body class="container">
		<div class="box">
			<div draggable="true" class="draggable">1</div>
			<div draggable="true" class="draggable">2</div>
			<div draggable="true" class="draggable">3</div>
			<div draggable="true" class="draggable">4</div>
			<div draggable="true" class="draggable">5</div>
		</div>
	</body>
	<script src="./flip.js"></script>
	<script>
		const box = document.querySelector(".box");
		let sourceNode;
		// 创建flip动画实例，监听列表元素
		const flip = new Flip(Array.from(box.children), 0.3);

		box.ondragstart = (e) => {
			setTimeout(() => {
				e.target.classList.add("dragging");
			}, 0);
			sourceNode = e.target;
		};

		box.ondragend = (e) => {
			e.target.classList.remove("dragging");
		};

		box.ondragover = (e) => {
			e.preventDefault();
		};

		box.ondragenter = (e) => {
			e.preventDefault();
			if (e.target === box || e.target === sourceNode) return;

			const children = Array.from(box.children);
			const sourceIndex = children.indexOf(sourceNode);
			const targetIndex = children.indexOf(e.target);

			// DOM 顺序改变前记录元素的初始位置
			flip.getFirstPosition();

			if (sourceIndex < targetIndex) {
				box.insertBefore(sourceNode, e.target.nextSibling);
			} else {
				box.insertBefore(sourceNode, e.target);
			}

			// 合并 last、invert、play操作
			flip.play();
		};
	</script>
</html>
