<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArkMusic</title>
    <link rel="stylesheet" href="../public_css/color.css">
    <link rel="stylesheet" href="./css/choice_bar.css">
    <link rel="stylesheet" href="./css/files_main_bar.css">
    <link rel="stylesheet" href="./css/files_slide frame.css">
    <style>
        body {

            margin: 0;
            padding: 0;

            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;

            /* border: 1px solid red; */

        }
        body > h1 {
            margin-left: 5vw;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    
    <!-- 标题 -->
    <h1 class="font_color">文件浏览</h1>

    <!-- 选项栏 -->
    <div class="choice_bar box_color">
        <div class="choice_bar_scroll" id="choice_bar_scroll">
            <div class="choice_bar_item active" data-type="所有歌曲"><p class="font_color">所有歌曲</p></div>
            <div class="choice_bar_separator"></div>
            <div class="choice_bar_item" data-type="文件夹"><p class="font_color">文件夹</p></div>
            <div class="choice_bar_separator"></div>
            <div class="choice_bar_item" data-type="播放列表"><p class="font_color">播放列表</p></div>
            <div class="choice_bar_separator"></div>
            <div class="choice_bar_item" data-type="我的喜欢"><p class="font_color">我的喜欢</p></div>
            <div class="choice_bar_separator"></div>
            <div class="choice_bar_item" data-type="专辑"><p class="font_color">专辑</p></div>
            <div class="choice_bar_separator"></div>
            <div class="choice_bar_item" data-type="歌手"><p class="font_color">歌手</p></div>
            <div class="choice_bar_separator"></div>
            <div class="choice_bar_item" data-type="播放最多"><p class="font_color">播放最多</p></div>
        </div>
    </div>
        </div>
    </div>

    <!-- 主页框架集 -->
    <div class="files_main_bar box_color" id="all_song_frame">
        <!-- 滑动框架 -->
        <div class="slide_frame">
            <!-- 占位符 -->
            <div style="height: 25px; position: relative; top: 0;"></div>
            <div class="slide" id="slide">
                <!-- 滑块内容(会实时变动) -->
                <div><div></div><p class="font_color">所有歌曲</p></div>
                <div><div></div><p class="font_color">所有歌曲</p></div>
                <div><div></div><p class="font_color">所有歌曲</p></div>
                <div><div></div><p class="font_color">所有歌曲</p></div>
                <div><div></div><p class="font_color">所有歌曲</p></div>
            </div>
        </div>
    </div>
    <div class="files_main_bar box_color hide" id="folder_frame">
    </div>
    <div class="files_main_bar box_color hide" id="playlist_frame">
    </div>
    <div class="files_main_bar box_color hide" id="favorite_frame">
    </div>
    <div class="files_main_bar box_color hide" id="album_frame">
    </div>
    <div class="files_main_bar box_color hide" id="artist_frame">
    </div>
    <div class="files_main_bar box_color hide" id="most_played_frame">
    </div>
    
    <!-- 函数块 -->
    <script src="../public_js/color_update.js"></script>
    <script src="js/environment.js"></script>
    <script src="js/function.js"></script>
    <script src="js/event_listener.js"></script>
    <script src="js/ark_update.js"></script>
    <script src="js/start.js"></script>

</body>
</html>
